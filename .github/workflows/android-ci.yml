name: Android Chat CI/CD

on:
  push:
    branches: [ master ]  # 你的默认分支是 master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout chatUI 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 给 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 Release APK
        run: ./gradlew assembleRelease

      - name: 上传构建产物 APK
        uses: actions/upload-artifact@v4
        with:
          name: chatui-release-apk
          path: app/build/outputs/apk/release/*.apk
